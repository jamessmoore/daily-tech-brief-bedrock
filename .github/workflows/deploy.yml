name: Deploy

# Manual trigger only, for now. This workflow does real AWS deploys
# (terraform apply, ECR push, lambda update-function-code) -- it should not
# fire automatically until Bedrock model access, AWS secrets, and the OIDC
# deploy role are actually set up and a manual deploy has been verified.
# Switch to `on: push: branches: [main]` once ready to trust it on every
# merge.
on:
  workflow_dispatch: {}

permissions:
  id-token: write   # required for OIDC -> AWS role assumption
  contents: read

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: daily-tech-brief-bedrock

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform variables
        run: |
          cat <<EOF > terraform/ci.auto.tfvars
          bedrock_model_id = "${{ secrets.BEDROCK_MODEL_ID }}"
          tavily_api_key    = "${{ secrets.TAVILY_API_KEY }}"
          slack_bot_token   = "${{ secrets.SLACK_BOT_TOKEN }}"
          EOF

      - name: Terraform apply -- ECR repo only (must exist before the image push)
        working-directory: terraform
        run: terraform apply -auto-approve -target=aws_ecr_repository.this

      - name: Get ECR repository URL
        id: ecr
        working-directory: terraform
        run: echo "url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        run: |
          docker build -t "${{ steps.ecr.outputs.url }}:latest" -f app/Dockerfile .
          docker push "${{ steps.ecr.outputs.url }}:latest"

      - name: Terraform apply -- everything else (Lambda, IAM, Scheduler, secrets)
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Update Lambda to the freshly pushed image
        working-directory: terraform
        run: |
          function_name=$(terraform output -raw lambda_function_name)
          aws lambda update-function-code \
            --function-name "$function_name" \
            --image-uri "${{ steps.ecr.outputs.url }}:latest"
          aws lambda wait function-updated --function-name "$function_name"
